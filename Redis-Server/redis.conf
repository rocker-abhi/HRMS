# Redis configuration file for HRMS Redis Server

# Bind to all interfaces inside the container
bind 0.0.0.0

# Port to listen on (default Redis port)
port 6379

# Set the authentication password
requirepass admin@123

# Total number of databases (0 to 15 are default, but we can set more if needed)
databases 16

# Enable persistence (AOF + RDB) to prevent losing tokens on restart
appendonly yes
appendfilename "appendonly.aof"
dbfilename dump.rdb
dir /data
